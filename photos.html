<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Merriweather:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header class="container text-center py-4">
        <div>
            <a href="index.html" class="btn btn-outline-dark">← Back to Home</a>
        </div>
    </header>

    <main class="container py-5">
        <!-- Event Photography Section -->
        <section class="mb-5">
            <h2 class="fw-bold mb-4">Event Photography</h2>
            <div class="row g-3">
                <div class="col-md-4">
                    <img src="/assets/event1.jpg" alt="Shot Show Party 2024" class="img-fluid">
                </div>
                <div class="col-md-4">
                    <img src="assets/event3.jpg" alt="Shot Show Party 2024" class="img-fluid">
                </div>
                <div class="col-md-4">
                    <img src="assets/event4.jpg" alt="Shotshell Adorned Table" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="assets/event6.jpg" alt="Clay Shooting" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="assets/event7.jpg" alt="Food Table" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="assets/event8.jpg" alt="Men in line for food" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="assets/event9.JPG" alt="Men in line for food" class="img-fluid">
                </div>
            </div>

        </section>

        <!-- Product Photography Section -->
        <section class="mb-5">
            <h2 class="fw-bold mb-4">Product Photography</h2>
            <div class="row g-3">
                <div class="col-md-4">
                    <img src="/assets/product1.jpg" alt="Product Photo 1" class="img-fluid">
                </div>
                <div class="col-md-4">
                    <img src="assets/product2.jpg" alt="Product Photo 2" class="img-fluid">
                </div>
                <div class="col-md-4">
                    <img src="/assets/product3.jpg" alt="Product Photo 3" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="/assets/product4.jpg" alt="Product Photo 4" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="/assets/product5.JPG" alt="Product Photo 5" class="img-fluid">
                </div>
            </div>
        </section>

        <!-- Portraits Section -->
        <section>
            <h2 class="fw-bold mb-4">Portraits</h2>
            <div class="row g-3">
                <div class="col-md-6">
                    <img src="assets/portrait1.JPG" alt="Portrait 1" class="img-fluid">
                </div>
                <div class="col-md-6">
                    <img src="/assets/portrait2.JPG" alt="Portrait 2" class="img-fluid">
                </div>
                <div class="col-md-4">
                    <img src="/assets/portrait3.JPG" alt="Portrait 3" class="img-fluid">
                </div>
                <div class="col-md-8">
                    <img src="/assets/leafs.jpg" alt="Portrait 4" class="img-fluid">
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-3">
        <p>Copyright &copy;
            <script>document.write(new Date().getFullYear())</script> All Rights Reserved
        </p>
    </footer>
</body>

</html>
